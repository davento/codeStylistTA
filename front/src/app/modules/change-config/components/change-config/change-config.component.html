<h1>Configuration</h1>
<div>
    <form [formGroup]="configForm">
        <mat-form-field appearance="outline">
            <mat-label>Programming language: </mat-label>
            <input type="text" formControlName="programmingLanguage" matInput required />
            <mat-error
                  *ngIf="configForm.controls['programmingLanguage'].hasError('required')"
                >
                  Programming language required.
                </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Course: </mat-label>
            <input type="text" formControlName="course" matInput required />
            <mat-error
                  *ngIf="configForm.controls['course'].hasError('required')"
                >
                  Course required.
                </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Response tone: </mat-label>
            <input type="text" formControlName="tone" matInput required />
            <mat-error
                  *ngIf="configForm.controls['tone'].hasError('required')"
                >
                  Response tone required.
                </mat-error>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Output format: </mat-label>
            <input type="text" formControlName="format" matInput required />
            <mat-error
                  *ngIf="configForm.controls['format'].hasError('required')"
                >
                  Output format required.
                </mat-error>
        </mat-form-field>
    </form>
</div>
<div>
    <button mat-stroked-button>Evaluate</button>
</div>
