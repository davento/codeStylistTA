<div role="banner">
  <div class="">
    <mat-menu>
      <button mat-menu-item routerLink="/">Home</button>
      <button mat-menu-item *ngIf="user == undefined" routerLink="/login">Log In</button>
      <button mat-menu-item *ngIf="user != undefined" routerLink="/edit">Edit Forms</button>
      <button mat-menu-item *ngIf="user != undefined" (click)="logOut()">Log Out</button>
    </mat-menu>
  </div>
</div>
