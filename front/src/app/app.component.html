  </mat-drawer>
  <mat-drawer-content>
    <app-header
    class="header"
    [user]="user"
    (openSideNav)="drawer.toggle()"

    <router-outlet class="content"></router-outlet>
  </mat-drawer-content>
</mat-drawer-container>
