version: '3.8'

services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    expose:
      - "5003"
    env_file:
      - ./back/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./nextjs-frontend
      dockerfile: Dockerfile
    expose:
      - "5003"
    env_file:
      - ./nextjs-frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "5003:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped