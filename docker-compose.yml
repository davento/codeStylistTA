version: '3.8'

services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    expose:
      - "8080"
    env_file:
      - ./back/.env
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./nextjs-frontend
      dockerfile: Dockerfile
    expose:
      - "8080"
    env_file:
      - ./nextjs-frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"  # This exposes port 8080 to the outside world
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge