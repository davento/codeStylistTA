version: '3.8'

services:
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    ports:
      - "6380:6380"
    expose:
      - "6380"
    env_file:
      - ./back/.env
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./nextjs-frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    expose:
      - "8080"
    env_file:
      - ./nextjs-frontend/.env.local
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge